# ==========================================
# Shygirl-Clash FINAL
# Clash Verge Rev / Mihomo
# Taiwan Home Broadband Reality
# ==========================================

mixed-port: 7890

allow-lan: true

bind-address: "*"

mode: rule

log-level: info

ipv6: false

unified-delay: true

tcp-concurrent: true

find-process-mode: strict


external-controller: 127.0.0.1:9090


profile:

  store-selected: true

  store-fake-ip: true



# =========================
# TUN
# =========================

tun:

  enable: true

  stack: mixed

  auto-route: true

  auto-detect-interface: true

  dns-hijack:

    - any:53



# =========================
# GEO
# =========================

geodata-mode: true


geox-url:

  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat

  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat

  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb



# =========================
# DNS
# =========================

dns:

  enable: true

  ipv6: false

  enhanced-mode: fake-ip

  fake-ip-range: 198.18.0.1/16


  default-nameserver:

    - 223.5.5.5


  nameserver:

    - https://dns.alidns.com/dns-query


  fallback:

    - https://dns.google/dns-query

    - https://cloudflare-dns.com/dns-query


  fallback-filter:

    geoip: true

    geoip-code: CN


  fake-ip-filter:

    - "*.lan"

    - "*.local"

    - localhost


  proxy-server-nameserver:

    - 223.5.5.5



# =========================
# PROXY
# =========================

proxies:


  - name: 🇹🇼 台湾家宽

    type: vless

    server: tw.1tjnco2257.online

    port: 52473


    uuid: 6b523423-18b0-4bd0-9b6e-25d5cf8a822e


    network: tcp


    tls: true

    udp: true


    flow: xtls-rprx-vision


    client-fingerprint: chrome


    skip-cert-verify: false


    servername: www.apple.com


    reality-opts:

      public-key: UNkMCocD_ulLlgEKeQ90G2iRRYW-0eZlurQPUda_8wc

      short-id: a0d85b75




# =========================
# GROUP
# =========================

proxy-groups:


  - name: 🚀 默认代理

    type: select

    proxies:

      - 🇹🇼 台湾家宽

