mixed-port: 7890

allow-lan: true

bind-address: "*"


mode: rule

log-level: info


ipv6: false


unified-delay: true

tcp-concurrent: true

find-process-mode: strict



external-controller: 127.0.0.1:9090



profile:

  store-selected: true

  store-fake-ip: true



geodata-mode: true



geox-url:

  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat

  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat

  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb




# =========================
# DNS
# =========================


dns:

  enable: true

  ipv6: false


  enhanced-mode: fake-ip


  fake-ip-range: 198.18.0.1/16


  default-nameserver:

    - 223.5.5.5



  nameserver:

    - https://dns.alidns.com/dns-query



  fallback:

    - https://dns.google/dns-query

    - https://cloudflare-dns.com/dns-query



  fallback-filter:

    geoip: true

    geoip-code: CN



  proxy-server-nameserver:

    - 223.5.5.5





# =========================
# Proxy
# =========================


proxies:


  - name: 🇹🇼 台湾家宽

    type: vless


    server: tw.1tjnco2257.online


    port: 22577


    uuid: f9d604b5-6f0e-42a1-935d-87de29475a00


    network: tcp


    tls: true

    udp: true


    flow: xtls-rprx-vision



    client-fingerprint: chrome



    servername: www.apple.com



    reality-opts:

      public-key: hw8AW8-WN63HD8KOOAiGcyHCh9mJuKsOgoX5d-aMQAQ

      short-id: 2b47d3d5





# =========================
# Groups
# =========================


proxy-groups:



  - name: 🚀 默认代理

    type: select

    proxies:

      - 🇹🇼 台湾家宽

      - DIRECT




  - name: 🤖 AI

    type: select

    proxies:

      - 🇹🇼 台湾家宽

      - DIRECT




  - name: 📱 Telegram

    type: select

    proxies:

